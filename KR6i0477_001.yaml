body:
  text: 西土聖賢集後漢沙門安世高譯皇明藕益釋智旭解大文為三初總標二別明三結歎今初為佛弟子常於晝夜至心誦念八大人覺不論在家出家但是歸依於佛即為佛之弟子既為佛子即應恒修此八種覺言常於晝夜者明其功無間斷言至心者明其親切真誠言誦念者明其文義淳熟記憶不忘也八大人覺釋現結歎文中二別明即為八初無常無我覺第一覺悟世間無常國土危脆四大苦空五陰無我生滅變異虗偽無主心是惡源形為罪藪如是觀察漸離生死此入道之初門破我法執之前陣也先觀世間無常國土危脆如高岸為谷深合為陵等則於依報無可貪著次以四大觀身地水火風互相陵害故有四百四病之苦各無實性故究竟皆空次以四陰觀心所謂受想行識并此色身共名五陰於中實無我及我所但是生滅之法剎那剎那遷變轉異不實故虗非真故偽遞相乘代故無主則於正報無可貪著又此正報身心不惟空愛惜之於事無益而且一迷六塵緣影為自心相則心便為眾惡之源一迷四大為自身相則形便為眾罪之藪倘不直下覷破害安有極若能如是觀察則身心二執漸輕即漸離生死之第一方便也二常修少欲覺第二覺知多欲為苦生死疲勞從貪欲起少欲無為身心自在此既以第一覺降伏見惑次以第二覺降伏思惑也思惑雖多欲貪為首能修少欲則可以悟無為而得自在矣三知足守道覺第三覺知心無厭足惟得多求增長罪惡菩薩不爾常念知足安貧守道惟慧是業此既修少欲復修知足以專心於慧業也多欲不知足人最能障慧今於少欲之中又復知足則慧業任運可進矣四常行精進覺第四覺知懈怠墜落常行精進破煩惱惡摧伏四魔出陰界獄夫所謂少欲知足者正欲省其精力以辦出要耳倘托言知足而反坐在懈怠坑中則墜落不淺矣故必常行精進以破見思煩惱煩惱之魔既破則陰魔天魔死魔皆悉摧伏而五陰十八界獄乃可出也五多聞智慧覺第五覺悟愚癡生死菩薩常念廣學多聞增長智慧成就辯才教化一切悉以大樂雖云精進若不廣學多聞增長智慧則成暗證之愆又有聞無慧如把火自燒有慧無聞如執刀自割聞慧具足方可自利利他六布施平等覺第六覺知貧苦多怨橫結惡緣菩薩布施等念怨親不念舊惡不憎惡人雖有智慧而無福德亦不可以自利利他故須具行三檀也知貧苦之多怨而行布施即財施也知怨親之平等而不念不憎即無畏施也法施已於上文明之今以財及無畏圓滿三檀耳七出家梵行覺第七覺悟五欲過患雖為俗人不染世樂常念三衣瓦鉢法器志願出家守道清白梵行高遠慈悲一切雖修智慧福德若不永離居家五欲終不可以紹隆僧寶住持佛法當知三世諸佛無有不示出家而成道者也三衣一安陀會二優多羅僧三僧伽梨也然使身雖出家而不能守道清白梵行高遠慈悲一切則為竊佛形儀罪加一等不可不知八大心普濟覺第八覺知生死熾然苦惱無量發大乘心普濟一切願代眾生受無量苦令諸眾生畢竟大樂雖復出家不發大乘普濟之心則慈心不周不發代眾生苦之心則悲心不切慈悲周切方是紹佛家業之真子也三結歎如此八事乃是諸佛菩薩大人之所覺悟精進行道慈悲修慧乘法身船至涅槃岸復還生死度脫眾生以前八事開導一切令諸眾生覺生死苦捨離五欲修心聖道若佛弟子誦此八事於念念中滅無量罪進趣菩提速登正覺永斷生死常住快樂如此八事下十六字結成名義精進行道下十六字結成自覺功德法身船指所悟性德涅槃岸指修德所顯也復還生死下三十二字結成覺他功德惟自覺方能覺他也若佛弟子下三十二字結成誦念功德能誦其文必能精思其義能思其義必能以此自覺覺他故能滅罪而斷生死苦趣覺而證常住樂也
